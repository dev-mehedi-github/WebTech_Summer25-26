<!DOCTYPE html>
<html>
    <head>
        <title>Div class</title>
    </head>
    <body>
        <div class="container">

  <!-- Radio Button Group (Choose Only One Option) -->
  <div class="radio-group">
    <label class="group-label">Select Your Notification Preference:</label>
    <label class="option-item">
      <input type="radio" name="notifications" value="email" checked>
      <span>Email Notifications</span>
    </label>
    <label class="option-item">
      <input type="radio" name="notifications" value="sms">
      <span>SMS Text Messages</span>
    </label>
    <label class="option-item">
      <input type="radio" name="notifications" value="none">
      <span>Turn Off Notifications</span>
    </label>
  </div>

  <!-- Checkbox Group (Choose Multiple Options) -->
  <div class="checkbox-group">
    <label class="group-label">Select Your Interests:</label>
    <label class="option-item">
      <input type="checkbox" name="interests" value="coding">
      <span>Software Engineering</span>
    </label>
    <label class="option-item">
      <input type="checkbox" name="interests" value="design">
      <span>UI/UX Product Design</span>
    </label>
    <label class="option-item">
      <input type="checkbox" name="interests" value="marketing">
      <span>Digital Marketing</span>
    </label>
  </div>

  <!-- Button Group (Action Triggers) -->
  <div class="button-group">
    <button type="button" class="btn btn-secondary">Cancel Changes</button>
    <button type="submit" class="btn btn-primary">Save Preferences</button>
  </div>

</div>

    </body>

    <form>
      <div class="container">
        
      </div>
    </form>
</html>
