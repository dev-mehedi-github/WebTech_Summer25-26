<!DOCTYPE html>
<html lang="es-US">
    <head>
        <title>Home page</title>
        <link rel="stylesheet" href="Mid Terrm/zHomePractice/QuizPractice/Design/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Welcome to Aiub portal </h1>
            <form>
                <fieldset>
                    <legend>Sign up</legend>
                    <table>
                        <tr>
                            <td><label for="username">User Name</label></td>
                            <td><input type="text" id="username" name="username" placeholder="Enter your username"></td>
                        </tr>

                        <tr>
                            <td><label for="password">Password</label></td>
                            <td><input type="password" id="pass" name="pass" placeholder="Enter password"></td>
                        </tr>

                        <tr>
                            <td><input type="submit" id="Login" name="Login" value="Login"></td>
                            <td><input type="button" value="clear"></td>
                        </tr>

                        <tr>
                        <td><label for="link">Cannot Sign In, <u>Forget password?</u></label></td>
                        </tr>
                        
                    </table>
                </fieldset>

                <fieldset class="createAccount">
                    <legend>Create Account</legend>
                    <h3>Lets create your account</h3>
                    <table>
                        <tr>
                        <td><label for="name">Name</label></td>
                        <td><input type="text" id="name" name="name" placeholder="Enter your full name"></td>
                        </tr>

                        <tr>
                            <td> <label for="email">Email<span class="required">*</span></label></td>
                            <td><input type="email" id="email" name="email" required placeholder="your@gmail.com"></td>
                        </tr>

                        <tr>
                            <td><label for="phone"> Phone</label></td>
                            <td><input type="number" id="number" name="number" placeholder="+880 XXXX XXXXXXX"></td>
                        </tr>

                        <tr>
                            <td> <label for="dob"> Date of birth</label></td>
                            <td> <input type="date" id="dob" name="dob"></td>
                        </tr>

                        <tr>
                            <td> <label for="gender">Gender</label></td>
                            <td>
                                <input type="radio" id="gender" name="gender" value="Male">
                                <label for="Male">Male</label>
                                <input type="radio" id="gender" name="gender" value="Female">
                                <label for="Female">Female</label>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="country">Region</label></td>
                            <td>
                                <select id="country">
                                    <option value="Default">Chosse</option>
                                    <option value="BD">Bangladesh</option>
                                    <option value="UK">United Kingdom </option>
                                    <option value="Bra">Brazil</option>
                                    <option value="Arg">Argentina</option>
                                    <option value="Prt">Portugal</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="Bg">Blood group</label></td>
                            <td>
                                <select id="Bg" name="Bg">
                                    <option value="Default">Choose</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </td>
                        </tr>
                        

                    </table>
                </fieldset>
            </form>
        </div>
    </body>
</html>
