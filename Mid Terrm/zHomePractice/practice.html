<!DOCTYPE html>
<html lang="es-Us">
    <head>
        <title>MediAssist | Sign Up</title>
    </head>
    <body>
        <div class="container">
            <h1>Welcome to MediAssist</h1>
            <form>
                <fieldset>
                    <legend>Sing Up</legend>
                    <table>
                        <h2>Create an Account</h2>
                        <tr>
                            <td><label for="Name">Name:</label></td> 
                            <td><input type="text" id="name" name="name"></td> 
                            <td> <label for="DOB">Date of birth:</label></td>
                            <td><input type="date" id="dob" name="dob"></td>
                        </tr>

                        <tr>
                            <td><label for="Address"></label>Address:</td>
                            <td><textarea id="Address" cols="21" rows="2" style="resize:none;"></textarea></td>
                            <td><label for="Email">Email:<span class="required">*</span></label></td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>

                        <tr>
                            <td><label for="Phone">Phone:</label></td>
                            <td><input type="text" id="phone" name="phone"></td>
                            <td><label for="Password">Password:</label></td>
                            <td><input type="Password" id="password" name="password"></td>
                        </tr>
                        
                        <tr>
                            <td><input type="submit" id="signup" name="signup" value="Sign Up"></td>
                        </tr>

                        <tr> 
                            <td><label for="Link"> Already sign up, Login</label></td>
                        </tr>

                        

                    </table>
                </fieldset>
            </form>
        </div>
    </body>
</html>
