<!DOCTYPE html>
<html lang="es-US">
    <head>
        <title>Sign Up</title>
    </head>
    <body>
        <h1>User Registration</h1>
        <form>
            <fieldset>
                <legend>Personal information</legend>
                <table>
                <tr>
                    <td><label for="userName">Name:</label></td>
                    <td><input type="text" id="name" name="name"></td>
                </tr>

                <tr>
                    <td><label for="phone">Phone:</label></td>
                    <td><input type="text" id="phone" name="phone"></td>
                </tr>

                <tr>
                    <td><label for="email">Email<span class="required">*:</span></label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

                <tr>
                    <td><label for="Gender">Gender:</label></td>
                    <td>
                        <input type="radio" id="Gender" name="Gender" value="Male">
                        <label for="Male">Male</label>
                        <input type="radio" id="Gender" name="Gender" value="Female">
                        <label for="Female">Female</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="Hobby">Hobby:</label></td>
                    <td>
                        <input type="checkbox" id="Sports" name="Hobby" value="Sports">
                        <label for="Sports">Sports</label>
                        <input type="checkbox" id="Gaming" name="Hobby" value="Gaming">
                        <label for="Gaming">Gaming</label>
                        <input type="checkbox" id="Reading" name="Hobby" value="Reading">
                        <label for="Reading">Reading</label>
                        <input type="checkbox" id="None" name="Hobby" value="None">
                        <label for="None">Nane</label>
                    </td>
                </tr>

                <tr>
                    <td> <label for="DOB">Date of Birth:</label></td>
                    <td><input type="date" id="DOB" name="DOB"></td>
                </tr>

                <tr>
                    <td><label for="UserCountry">Country:</label></td>
                    <td>
                        <select id="Country">   
                            <option value="Default">Select country</option>
                            <option value="BD">Bangladesh</option>
                            <option value="UK">United Kingdom</option>
                            <option value="USA">United States</option>
                            <option value="PR">Portugal </option>
                            <option value="FR">France</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="BloodGroup">Blood Group:</label></td>
                    <td>
                        <select id="BloodGroup">
                            <option value="Default">Select blood group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="Address">Address:</label></td>
                    <td><textarea  id="Address" cols="30" rows="2" style="resize:none;"></textarea></td>
                </tr>

                <tr>
                    <td><label for="file">Picture<span class="required">*:</span></label></td>
                    <td><input type="file" id="Picture" name="Picture"></td>
                </tr>

                <tr>
                    <td><input type="submit" id="submit" name="submit" value="Sign Up"></td>
                </tr>


            </table>
            </fieldset>
        </form>
    </body>
</html>
