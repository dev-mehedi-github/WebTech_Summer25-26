<!DOCTYPE html>
<html lang="es-US">
    <head>
        <title>ABC Bank</title>
    </head>
    <body>
        <div class="container">
            <h1>Welcome to ABC Bank</h1>
            <form>
                <fieldset>
                    <legend>Bank Account Registration</legend>
                    <table>
                        <tr>
                            <td><label for="AccHolderName">Account Holder Name:</label></td>
                            <td><input type="text" id="name" name="name"></td>
                        </tr>

                        <tr>
                            <td><label for="phone">Account Holder Phone:</label></td>
                            <td><input type="text" id="phone" name="phone"></td>
                        </tr>

                        <tr>
                            <td><label for="email">Account Holder Email<span class="required">*:</span></label></td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>

                        <tr>
                            <td><label for="Address">Address:</label></td>
                            <td><textarea  id="Address" cols="30" rows="2" style="resize:none;"></textarea></td>
                        </tr>

                        <tr>
                            <td><label for="Gender">Gender:</label></td>
                            <td>
                                <input type="radio" id="Gender" name="Gender" value="Male">
                                <label for="Male">Male</label>
                                <input type="radio" id="Gender" name="Gender" value="Female">
                                <label for="Female">Female</label>
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="checkbox" id="Conditions" name="Conditions" value="Conditions">
                                <label for="Conditions"><font color="red">I agree with the terms and conditions</font><span class="required">*</span></label>
                            </td>
                        </tr>

                        <tr>
                            <td><input type="submit" id="submit" name="submit" value="Submit"></td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </div>
    </body>
</html>
